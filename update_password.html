<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <div style="max-width: 400px; margin: 100px auto; text-align: center; font-family: sans-serif;">
        <h2>새 비밀번호 설정</h2>
        <input type="password" id="new-password" placeholder="8자리 이상 입력" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <button onclick="updatePassword()" style="width: 100%; padding: 10px; background-color: #3ecf8e; color: white; border: none; cursor: pointer;">비밀번호 저장</button>
        <p id="message"></p>
    </div>

    <script>
        // Vercel 환경변수나 직접 입력을 통해 설정
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            const messageTag = document.getElementById('message');

            const { error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                messageTag.innerText = "오류: " + error.message;
                messageTag.style.color = "red";
            } else {
                messageTag.innerText = "성공적으로 변경되었습니다!";
                messageTag.style.color = "green";
            }
        }
    </script>
</body>
</html>
