<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
    <div style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h2>새 비밀번호 설정</h2>
        <p>새로 사용할 비밀번호를 입력해주세요.</p>
        <input type="password" id="new-password" placeholder="새 비밀번호 (8자 이상)" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <button onclick="updatePassword()" style="width: 100%; padding: 10px; cursor: pointer;">비밀번호 저장</button>
        <p id="message"></p>
    </div>

    <script>
        // Vercel에 배포하면 이 값들은 자동으로 채워질 것입니다.
        const SUPABASE_URL = "실제_주소_입력_혹은_자동연결"; 
        const SUPABASE_KEY = "실제_키_입력_혹은_자동연결";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            const messageTag = document.getElementById('message');

            const { error } = await supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                messageTag.innerText = "오류: " + error.message;
                messageTag.style.color = "red";
            } else {
                messageTag.innerText = "성공! 비밀번호가 변경되었습니다.";
                messageTag.style.color = "green";
                // 2초 뒤에 메인 페이지로 이동 (선택)
                setTimeout(() => { window.location.href = '/'; }, 2000);
            }
        }
    </script>
</body>
</html>
